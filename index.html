<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umi B&B - Giulianova</title>
    
    <script>
        function showLang(langId, btn) {
            var contents = document.getElementsByClassName('lang-content');
            for (var i = 0; i < contents.length; i++) {
                contents[i].style.display = 'none';
            }
            var selected = document.getElementsByClassName(langId);
            for (var j = 0; j < selected.length; j++) {
                selected[j].style.display = 'block';
            }
            var buttons = document.getElementsByClassName('lang-btn');
            for (var k = 0; k < buttons.length; k++) {
                buttons[k].classList.remove('active');
            }
            btn.classList.add('active');
        }

        function openFullImg(imgElement) {
            var modal = document.getElementById("imageModal");
            var modalImg = document.getElementById("imgFull");
            modal.style.display = "flex";
            modalImg.src = imgElement.src;
        }

        function closeFullImg() {
            document.getElementById("imageModal").style.display = "none";
        }
    </script>

    <style>
        :root { --primary: #003580; --secondary: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); scroll-behavior: smooth; }
        nav { background: var(--primary); padding: 15px; position: sticky; top: 0; z-index: 1000; text-align: center; }
        nav a { color: white; text-decoration: none; font-weight: bold; margin: 0 15px; text-transform: uppercase; font-size: 0.85rem; }
        
        /* ОБНОВЕН HEADER С header1.jpg */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/header1.jpg'); 
            background-size: cover; 
            background-position: center; 
            height: 400px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .hero h1 { font-size: 4rem; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .lang-switcher { text-align: center; margin: 20px 0; }
        .lang-btn { background: white; border: 2px solid var(--primary); padding: 8px 18px; margin: 5px; cursor: pointer; border-radius: 25px; font-weight: bold; }
        .lang-btn.active { background: var(--primary); color: white; }
        .content-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .lang-content { display: none; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .gallery img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .gallery img:hover { filter: brightness(0.8); }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { max-width: 90%; max-height: 85vh; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        ul { columns: 2; list-style-type: none; padding: 0; }
        li { padding: 5px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="imageModal" class="modal" onclick="closeFullImg()">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="imgFull">
</div>

<nav>
    <a href="#about">About</a>
    <a href="#facilities">Faciliteiten</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
</nav>

<section class="hero">
    <h1>UMI B&B</h1>
    <p>Giulianova, Abruzzo, Italy</p>
</section>

<div class="container">
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="showLang('en', this)">🇬🇧 English</
